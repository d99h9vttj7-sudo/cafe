
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cafe sample</title>
    <link rel="stylesheet" href="sanitize.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
     <header class="header">
            
        <h1 class="hedader-logo" >水中喫茶</h1>
            <nav>
                <ul class="header-list">
                    <li class="header-item"><a href="#home">home</a></li>
                    <li class="header-item"><a href="#menu">menu</a></li>
                    <li class="header-item"><a href="#about">about</a></li>
                    <li class="header-item"><a href="#contact">contact</a></li>

                 </ul>
            </nav>
    </header>

 <main>
        
     <section id="home" class="home">

        <h2 class="home-logo">深海に沈んだ、静かなカフェ  </h2>
            <p class="home-text">店内は青い光と揺らぐ照明で、水の中にいるような空間となっております。<br>
                音は控えで、泡の音やゆったりとした環境音をお楽しみください。
            </p>
    </section>


    <section class="menu">
        <h2 class="menu-logo">menu</h2>
                        

        <div class="slider">
            <img src="image/creamsoda.jpg" class="active">
            <img src="image/waffle.jpg">
            <img src="image/sandwichi.jpg">
                    
        </div>
        <div class="menu-text">
                <p>
                 沈んでいく時間に寄り添う一品を取り揃えてお待ちしております。
                </p>

        </div>
                    

<section id="menu" class="menu-box">
    <div class="menu-card">
        <a href="menu.html">
             <p class="menu-drink-ligo">Drinks</p>
              <img src="image/creamsoda.jpg" alt="soda">
         </a>
    </div>

    <div class="menu-card">
        <a href="menu.html">
         <p class="menu-drink-ligo">Food</p>
         <img src="image/sandwichi.jpg" alt="sandwichi">
        </a>
    </div>

    <div class="menu-card">
        <a href="menu.html">
         <p class="menu-drink-ligo">Deserts</p>
         <img src="image/parfait.jpg" alt="parfait">
        </a>
    </div>

    <div class="menu-card">
        <a href="menu.html">
         <p class="menu-drink-ligo">Seasonal</p>
         <img src="image/creamsoda.jpg" alt="soda">
        </a>
    </div>


 </section>




     <section id="about" class="about">
        <h2 class="agout-logo">about</h2>
        <figure class="about-img">
            <img src="image/shopstyle.jpg" alt="shop">
                <figcaption class="about-box">
                    <h3 class="about-heard">水中喫茶の歴史</h3>
                    <p class="about-text">水中喫茶は2013年の夏に開業しました。<br>
                    元々は普通の喫茶店として営業していましたが、ある日を境に「水中のような空間」へ生まれ変わりました。<br>
                    理由は海底の底に眠っています。<br>
                    気になる方は是非当店へお越しいただき、水の中で考察してみては…
                    </p>
                </figcaption>
            
        </figure>
    </section>









    <section id="contact" class="contact">

        <h2 class="contact-logo">contact</h2>
        <form  class="form" action="">
            <table class="form-tarble">
                <tr>
                    <th>
                        <label for="menu">
                        Menu
                        </label>

                    </th>
                    <td>
                        <select class="select" id="menu">
                            <option value="menu-1">menu1</option>
                            <option value="menu-2">menu2</option>
                            <option value="menu-3">menu3</option>
                        </select>

                    </td>
                </tr>

                <tr>
                    <th>
                        <label for="name">
                            Name
                        </label>
                    </th>
                    <td>
                       <input class="input" type="text" id="name">

                    </td>
                </tr>

                 <tr>
                    <th>
                        <label for="email">
                            Email
                        </label>

                    </th>
                    <td>
                        <input class="input" type="email" id="email">
                    </td>
                </tr>

                <tr>
                    <th>
                        Gender

                    </th>
                    <td>
                        <label class="radio">
                        <input type="radio" name="gender" value="male">Male
                        </label>
                        <label class="radio">
                        <input type="radio" name="gender" value="femmail">Femail
                        </label>
                        <label class="radio">
                        <input type="radio" name="gender" value="other">Other
                        </label>

                    </td>
                </tr>
                <tr>
                    <th>
                        <label for="detail">
                        Detail
                        </label>

                    </th>
                    <td>
                        <textarea class="textarea" cols="30" rows="10" id="detail"></textarea>
                    </td>
                </tr>



            </table>
           <button class="button">Submit


           </button>
        </form>



    </section>
        
        

       
</main>
       
<footer class="footer">
    <figure class="footer-map">
     <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d1620.4198635642892!2d139.7660667!3d35.6809482!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188bfbd89f700b%3A0x277c49ba34ed38!2z5p2x5Lqs6aeF!5e0!3m2!1sja!2sjp!4v1781587279585!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

 
        <figcaption class="footer-mapoinfo">
            <div class="footer-maplogo">
                水中喫茶
            </div>
            
            <address class="footer-mapaddress">
                〒100-1000 東京都千代田区丸の内1-1 <br>
                <a href="https://maps.app.goo.gl/yo6VaqNHEmR42o9G9" target="_blank"> Google</a>

            </address>

        </figcaption>
    </figure>


     <small class="footer-copy">
       Copyright ©水中喫茶
     </small>


          
 </footer>

        <script>
            const images=document.querySelectorAll('.slider img');
            let index=0;

            setInterval(()=>{
                images[index].classList.remove('active');
                index = (index+1)% images.length
                images[index].classList.add('active');
            },4000);

        </script>
    </body>
</html>
